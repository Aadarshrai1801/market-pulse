<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · MarketPulse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="login-body">

    <div class="login-card">
        <div class="brand" style="justify-content:center;margin-bottom:22px;">
            <div class="brand-logo">🌿</div>
            <div class="brand-text">
                <div class="brand-name">MARKETPULSE</div>
                <div class="brand-sub">UAE FRESH PRODUCE</div>
            </div>
        </div>

        <div class="login-title">Sign in</div>
        <div class="login-sub">Enter your credentials to continue</div>

        {% if google_enabled %}
        <a class="google-btn" id="googleSignInBtn" href="/auth/google/login">
            <svg class="google-icon" viewBox="0 0 18 18" width="18" height="18" aria-hidden="true">
                <path fill="#4285F4"
                    d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62z" />
                <path fill="#34A853"
                    d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.9v2.33A9 9 0 0 0 9 18z" />
                <path fill="#FBBC05"
                    d="M3.95 10.7A5.4 5.4 0 0 1 3.66 9c0-.59.1-1.17.29-1.7V4.97H.9A9 9 0 0 0 0 9c0 1.45.35 2.83.9 4.03l3.05-2.33z" />
                <path fill="#EA4335"
                    d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .9 4.97l3.05 2.33C4.66 5.17 6.65 3.58 9 3.58z" />
            </svg>
            Continue with Google
        </a>
        <div class="login-divider"><span>or sign in with a password</span></div>
        {% endif %}

        <form id="loginForm" class="login-form" autocomplete="on">
            <div class="field">
                <div class="field-label">Username</div>
                <input class="text-input" id="loginUsername" name="username" type="text" autocomplete="username"
                    autofocus>
            </div>
            <div class="field">
                <div class="field-label">Password</div>
                <input class="text-input" id="loginPassword" name="password" type="password"
                    autocomplete="current-password">
            </div>

            <button class="fetch-btn login-submit" id="loginSubmit" type="submit">Sign In</button>
            <div class="status-line" id="loginStatus" style="display:none;"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const status = document.getElementById('loginStatus');
        const submitBtn = document.getElementById('loginSubmit');

        function showError(message) {
            status.textContent = message;
            status.className = 'status-line error';
            status.style.display = 'block';
        }

        // Carry ?next= through to Google so it lands back on the right page,
        // and surface any error Google/the backend redirected back with.
        const urlParams = new URLSearchParams(window.location.search);
        const nextParam = urlParams.get('next');
        const googleBtn = document.getElementById('googleSignInBtn');
        if (googleBtn && nextParam) {
            googleBtn.href = `/auth/google/login?next=${encodeURIComponent(nextParam)}`;
        }

        const OAUTH_ERROR_MESSAGES = {
            google_auth_failed: 'Google sign-in failed. Please try again.',
            google_not_configured: 'Google sign-in isn\'t set up yet. Ask your administrator.',
            google_email_unverified: 'That Google account\'s email isn\'t verified yet.',
            account_deactivated: 'This account has been deactivated. Contact an administrator.',
        };
        const oauthError = urlParams.get('error');
        if (oauthError && OAUTH_ERROR_MESSAGES[oauthError]) {
            showError(OAUTH_ERROR_MESSAGES[oauthError]);
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('Enter both a username and password.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in…';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await response.json().catch(() => ({}));

                if (!response.ok || !data.ok) {
                    showError(data.error || 'Invalid username or password.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                    return;
                }

                const params = new URLSearchParams(window.location.search);
                window.location.href = params.get('next') || '/';
            } catch (error) {
                showError('Could not reach the server. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>

</body>

</html>
